<header style="background-color: var(--color-primario); padding: 20px 20px 25px 20px; color: white; position: sticky; top: 0; z-index: 1000;">
  
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
    <h1 style="font-size: 22px; margin: 0; color: white;">Las Machas <span style="font-size: 12px; font-weight: normal; opacity: 0.8;">(Administrador)</span></h1>
    
    <svg routerLink="/admin/mis-datos" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor: pointer;">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
      <circle cx="12" cy="7" r="4"></circle>
    </svg>
  </div>

  <div style="background: white; border-radius: 20px; padding: 10px 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#757575" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 10px;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" (input)="onBuscar($event)" placeholder="Buscar por nombre, categoría o presentación..." style="border: none; outline: none; width: 100%; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--color-tipografia);">
  </div>

</header>

<main zstyle="padding-bottom: 90px; max-width: 1200px; margin: 0 auto;">
  <router-outlet></router-outlet>
</main>

<nav style="position: fixed; bottom: 0; left: 0; width: 100%; background: white; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); display: flex; justify-content: space-around; padding: 12px 0 20px 0; z-index: 1000;">
  
  <button routerLink="/admin/catalogo" style="background: transparent; border: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: var(--color-primario);">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 4px;"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
    <span style="font-size: 12px; font-weight: bold; font-family: 'Inter', sans-serif;">Catálogo</span>
  </button>
  
  <button routerLink="/admin/agregar-producto" style="background: transparent; border: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: var(--color-primario);">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 4px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    <span style="font-size: 12px; font-weight: bold; font-family: 'Inter', sans-serif;">Agregar</span>
  </button>
  
  <button routerLink="/admin/tablero-pedidos" style="background: transparent; border: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: var(--color-primario);">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 4px;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
    <span style="font-size: 12px; font-weight: bold; font-family: 'Inter', sans-serif;">Pedidos</span>
  </button>

</nav>
