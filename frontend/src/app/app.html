<!-- ENCABEZADO GLOBAL -->
@if (showLayout()) {
  <header class="main-header">
    <div class="header-top">
      
      <h1 class="brand-title">
        Las Machas
        @if (authService.isAdmin()) {
          <span class="admin-badge">(Administrador)</span>
        }
      </h1>
      
      <div class="header-actions">
        <!-- Botón de Cerrar Sesión -->
        <button (click)="authService.logout()" class="icon-btn" title="Cerrar Sesión">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>

        <!-- Botón de Perfil -->
        <button [routerLink]="authService.isAdmin() ? '/admin/mis-datos' : '/perfil'" class="icon-btn" title="Mi Perfil">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </button>
      </div>

    </div>

    <!-- Buscador Unificado -->
    <div class="search-container">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#757575" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input 
        type="text" 
        placeholder="Buscar por nombre, categoría o presentación..." 
        class="search-input"
        (input)="actualizarBusqueda($event)">
    </div>
  </header>
}

<!-- CONTENEDOR PRINCIPAL -->
<main class="main-content" [class.with-padding]="showLayout()">
  <router-outlet></router-outlet>
</main>

<!-- BARRA DE NAVEGACIÓN INFERIOR -->
@if (showLayout()) {
  <nav class="machas-barra-flotante">
    
    <!-- Catálogo -->
    <button [routerLink]="authService.isAdmin() ? '/admin/catalogo' : '/tienda'" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      <span>Catálogo</span>
    </button>

    @if (authService.isAdmin()) {
      <!-- Solo Admin: Agregar -->
      <button routerLink="/admin/agregar-producto" class="nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        <span>Agregar</span>
      </button>

      <!-- Solo Admin: Pedidos -->
      <button routerLink="/admin/tablero-pedidos" class="nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
        <span>Pedidos</span>
      </button>
    } @else {
      <!-- Cliente: Compras -->
      <button routerLink="/carrito" class="nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span>Carrito</span>
      </button>
    }
  </nav>
}
