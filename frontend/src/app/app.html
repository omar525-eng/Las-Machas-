@if (authService.currentRole() || router.url !== '/login') {
  <header style="background-color: var(--color-primario); padding: 15px; color: white; position: sticky; top: 0; z-index: 1000;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
      <h1 style="font-size: 20px; margin: 0;">Las Machas</h1>
      <button routerLink="/carrito" style="background: none; border: none; color: white; cursor: pointer;">
        🛒 <span style="font-size: 12px;">({{ cartService.itemCount() }})</span>
      </button>
    </div>

    <div style="background: white; border-radius: 20px; padding: 8px 15px; display: flex; align-items: center;">
      <input type="text" (input)="actualizarBusqueda($event)" placeholder="¿Qué salsa buscas hoy?" style="border: none; outline: none; width: 100%; color: var(--color-tipografia);">
    </div>
  </header>
}

<main style="padding-bottom: 80px;">
  <router-outlet></router-outlet>
</main>

@if (authService.currentRole() || router.url !== '/login') {
  <nav style="position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid #eee;">
    <button routerLink="/tienda" style="background: none; border: none; display: flex; flex-direction: column; align-items: center; color: var(--color-primario);">
      🏠 <span style="font-size: 10px;">Tienda</span>
    </button>
    <button routerLink="/carrito" style="background: none; border: none; display: flex; flex-direction: column; align-items: center; color: var(--color-primario);">
      🛒 <span style="font-size: 10px;">Carrito</span>
    </button>
  </nav>
  <span>({{ cartService.itemCount() }})</span>
}
