<div style="padding: 20px; max-width: 1200px; margin: 0 auto;">
  
  <div style="text-align: center; margin-bottom: 30px;">
    <h2 style="font-size: 28px; color: var(--color-primario);">Nuestra Tienda de Salsas</h2>
    <p style="color: var(--texto-secundario);">Elige tu favorita y recíbela en casa</p>
  </div>

  <div class="grid-catalogo">
    @for (producto of productosFiltrados(); track producto.ProductoID) {
      <div class="tarjeta-salsa">
        <img [src]="producto.ImagenURL" [alt]="producto.Nombre" class="img-salsa">
        
        <div class="info-salsa">
          <h3>{{ producto.Nombre }}</h3>
          <p class="tamano">{{ producto.Tamano }}</p>
          <div class="precio">${{ producto.PrecioRegular }}</div>
          
          <button class="btn-machas" (click)="agregarAlCarrito(producto)">
            🛒 Añadir al Carrito
          </button>
        </div>
      </div>
    } @empty {
      <div class="vacio">No encontramos salsas con ese nombre.</div>
    }
  </div>
</div>
