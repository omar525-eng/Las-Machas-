<div style="padding: 20px; max-width: 1200px; margin: 0 auto;">
  
  <div style="text-align: center; margin-bottom: 30px;">
    <h2 style="font-size: 28px; color: var(--color-primario); font-weight: bold;">Nuestra Tienda de Salsas</h2>
    <p style="color: var(--texto-secundario);">Elige tu favorita!!</p>
  </div>

  <div class="grid-catalogo">
    @for (producto of productosFiltrados(); track producto.ProductoID) {
      <div class="tarjeta-macha">
        <img [src]="producto.ImagenURL || 'https://via.placeholder.com/300x180?text=Sin+Imagen'" 
             [alt]="producto.Nombre" 
             class="img-salsa" 
             [routerLink]="['/producto', producto.ProductoID]">
        
        <div class="info-salsa">
          <div style="color: var(--color-secundario); font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 4px;">Producto</div>
          
          <h3 [routerLink]="['/producto', producto.ProductoID]" style="cursor: pointer;">
            {{ producto.Nombre }}
          </h3>
          <p class="tamano">{{ producto.Tamano || 'Presentación Única' }}</p>
          <div class="precio-tag">${{ producto.PrecioRegular || '0.00' }}</div>
          
          <button class="btn-agregar" (click)="agregarAlCarrito(producto)">
             Añadir al Carrito
          </button>
        </div>
      </div>
    } @empty { 
      <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--texto-secundario); background: #f9f9f9; border-radius: 8px; border: 1px dashed #ccc;">
        <p style="font-weight: bold;">No encontramos salsas con ese nombre.</p>
      </div>
    }
  </div>

  <!-- BOTÓN FLOTANTE WHATSAPP -->
  <button class="btn-flotante-whatsapp" (click)="enviarDudaWhatsApp()" title="¿Dudas? Contáctanos">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
  </button>
</div>
