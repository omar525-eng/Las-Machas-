@if (producto(); as prod) {
<div class="detalle-container">
  <button class="btn-regresar" (click)="regresar()">
    &larr; Regresar a la Tienda
  </button>

  <div class="tarjeta-detalle">
    <div class="imagen-container">
      <img [src]="prod.ImagenURL || 'assets/placeholder.jpg'" [alt]="prod.Nombre" class="img-producto">
    </div>

    <div class="info-container">
      <h2 class="titulo">{{ prod.Nombre }}</h2>
      <p class="categoria">{{ prod.Categoria }} | {{ prod.Tamano }}</p>
      
      <div class="precio-container">
        <p class="precio">${{ prod.PrecioRegular }} MXN</p>
      </div>

      <div class="descripcion">
        <h3>Descripción</h3>
        <p>{{ prod.Descripcion || 'Sin descripción disponible.' }}</p>
      </div>

      <button class="btn-agregar" (click)="agregarAlCarrito()">
        Agregar al Carrito
      </button>
    </div>
  </div>
</div>
} @else {
<div style="text-align: center; padding: 50px; color: var(--texto-secundario);">
  <h2>Cargando información de tu Macha... 🌶️</h2>
</div>
}
