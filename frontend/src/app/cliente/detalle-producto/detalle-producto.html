<div class="detalle-container" *ngIf="producto">
  <button class="btn-regresar" (click)="regresar()">
    &larr; Regresar al Catálogo
  </button>

  <div class="tarjeta-detalle">
    <div class="imagen-container">
      <img [src]="producto.ImagenURL || 'assets/placeholder.jpg'" [alt]="producto.Nombre" class="img-producto">
    </div>

    <div class="info-container">
      <h2 class="titulo">{{ producto.Nombre }}</h2>
      <p class="categoria">{{ producto.Categoria }} | {{ producto.Tamano }}</p>
      
      <div class="precio-container">
        <p class="precio">${{ producto.PrecioRegular | number:'1.2-2' }} MXN</p>
      </div>

      <div class="descripcion">
        <h3>Descripción</h3>
        <p>{{ producto.Descripcion || 'Nuestra receta original elaborada con ingredientes seleccionados de alta calidad para darle a tus platillos el toque perfecto.' }}</p>
      </div>

      <button class="btn-agregar" (click)="agregarAlCarrito()">
        🛒 Agregar al Carrito
      </button>
    </div>
  </div>
</div>
