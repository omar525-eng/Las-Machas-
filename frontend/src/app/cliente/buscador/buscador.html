<div style="padding: 20px; max-width: 1200px; margin: 0 auto;">
  <div style="text-align: center; margin-bottom: 30px;">
    <h2 class="titulo-tarjeta" style="font-size: 28px; color: var(--color-primario);">Nuestras Salsas</h2>
    <p style="color: var(--texto-secundario);">Encuentra tu nivel de picor ideal</p>
  </div>

  <div class="grid-catalogo">
    @for (producto of productos; track producto.ProductoID) {
      <div style="background: var(--color-tarjeta); border-radius: 12px; padding: 16px; box-shadow: var(--sombra-tarjeta); text-align: center; display: flex; flex-direction: column; justify-content: space-between;">
        <img [src]="producto.ImagenURL" [alt]="producto.Nombre" style="width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 12px;">
        <div>
          <h3 style="font-size: 18px;">{{ producto.Nombre }}</h3>
          <p style="color: var(--texto-secundario); font-size: 14px; margin-bottom: 10px;">{{ producto.Tamano }}</p>
          <div style="font-size: 20px; font-weight: bold; margin-bottom: 15px;">${{ producto.PrecioRegular }}</div>
          <button class="btn-machas" (click)="agregarAlCarrito(producto)" style="width: 100%;">🛒 Agregar al Carrito</button>
        </div>
      </div>
    } @empty {
      <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--texto-secundario); background: #f9f9f9; border-radius: 8px; border: 1px dashed #ccc;">
        <p style="font-weight: bold;">No se encontraron productos que coincidan con tu búsqueda.</p>
        <p>Intenta con otros términos.</p>
      </div>
    }
  </div>
</div>
