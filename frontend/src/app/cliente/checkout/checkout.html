<div style="padding: 20px; max-width: 500px; margin: 40px auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-family: sans-serif;">
  
  <h2 style="text-align: center; color: #e91e63; margin-bottom: 5px;">Finalizar Pedido</h2>
  <p style="text-align: center; color: #666; font-size: 14px; margin-bottom: 25px;">Llena tus datos para coordinar la entrega</p>

  <div style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px;">
    <div>
      <label style="font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; color: #333;">Nombre Completo:</label>
      <input type="text" [(ngModel)]="nombre" placeholder="Ej. Juan Pérez" 
             style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; box-sizing: border-box;">
    </div>

    <div>
      <label style="font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; color: #333;">Dirección de Entrega:</label>
      <input type="text" [(ngModel)]="direccion" placeholder="Calle, Número, Colonia..." 
             style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; box-sizing: border-box;">
    </div>
  </div>

  <div style="background: #f9f9f9; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
    <h4 style="margin: 0 0 15px 0; border-bottom: 1px solid #eee; padding-bottom: 10px;">Resumen:</h4>
    
    @for (item of cartService.getItems()(); track item.id) {
      <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; color: #444;">
        <span>{{ item.cantidad }}x {{ item.nombre }}</span>
        <span>${{ (item.precio * item.cantidad).toFixed(2) }}</span>
      </div>
    }

    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; margin-top: 15px; border-top: 2px dashed #eee; padding-top: 15px;">
      <span>Total a pagar:</span>
      <span style="color: #e91e63;">${{ cartService.total().toFixed(2) }}</span>
    </div>
  </div>

  <button (click)="enviarWhatsApp()" 
          style="width: 100%; background-color: #25D366; color: white; border: none; border-radius: 8px; padding: 15px; font-size: 16px; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; transition: 0.3s;">
    <span>💬</span> Enviar Pedido por WhatsApp
  </button>

  <div style="text-align: center; margin-top: 15px;">
    <a routerLink="/carrito" style="color: #666; text-decoration: underline; font-size: 14px; cursor: pointer;">
      Regresar al carrito
    </a>
  </div>

</div>
