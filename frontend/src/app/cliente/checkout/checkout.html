<div style="padding: 20px; max-width: 600px; margin: 40px auto; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
  
  <h2 style="text-align: center; color: var(--color-primario); margin-bottom: 25px;">Finalizar Pedido</h2>

  <div style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px;">
    <div>
      <label style="font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px;">Nombre Completo:</label>
      <input type="text" [(ngModel)]="nombre" placeholder="Ej. Juan Pérez" 
             style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; outline: none;">
    </div>

    <div>
      <label style="font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px;">Dirección de Entrega:</label>
      <input type="text" [(ngModel)]="direccion" placeholder="Calle, Número, Colonia..." 
             style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; outline: none;">
    </div>
  </div>

  <div style="background: var(--color-fondo); padding: 15px; border-radius: 8px;">
    <h4 style="margin-bottom: 10px;">Resumen de tu pedido:</h4>
    @for (item of cartService.getItems()(); track item.id) {
      <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px;">
        <span>{{ item.cantidad }}x {{ item.nombre }}</span>
        <span>${{ item.precio * item.cantidad }}</span>
      </div>
    }
    <hr style="border: 0.5px solid #ddd; margin: 10px 0;">
    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 18px;">
      <span>Total a pagar:</span>
      <span style="color: var(--color-primario);">${{ cartService.total() }}</span>
    </div>
  </div>

  <button (click)="enviarWhatsApp()" 
          style="width: 100%; background-color: #25D366; color: white; border: none; border-radius: 8px; padding: 15px; font-size: 16px; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 6px rgba(37, 211, 102, 0.3);">
    <span style="font-size: 20px;">💬</span> Enviar Pedido por WhatsApp
  </button>

  <button routerLink="/carrito" 
          style="width: 100%; background: transparent; border: none; color: #666; cursor: pointer; text-decoration: underline; margin-top: 15px; font-size: 14px;">
    Regresar al carrito
  </button>

</div>
