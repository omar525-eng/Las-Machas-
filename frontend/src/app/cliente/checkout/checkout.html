<div style="padding: 20px; max-width: 600px; margin: 40px auto; background: var(--color-tarjeta); border-radius: var(--radio-borde); box-shadow: var(--sombra-tarjeta);">
  
  <h2 style="text-align: center; color: var(--color-primario); margin-bottom: 5px;">Finalizar Pedido</h2>
  <p style="text-align: center; color: var(--texto-secundario); margin-bottom: 25px;">Llena tus datos para coordinar la entrega</p>

  <form style="display: flex; flex-direction: column; gap: 15px;">
    
    <div>
      <label style="font-weight: bold; font-size: 14px;">Nombre Completo:</label>
      <input type="text" placeholder="Ej. Juan Pérez" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-top: 5px;">
    </div>

    <div>
      <label style="font-weight: bold; font-size: 14px;">Dirección de Entrega:</label>
      <input type="text" placeholder="Calle, Número, Colonia..." style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-top: 5px;">
    </div>

    <div style="background: var(--color-fondo); padding: 15px; border-radius: 8px; margin-top: 10px;">
      <h4 style="margin-bottom: 10px;">Resumen:</h4>
      <div style="display: flex; justify-content: space-between; font-size: 14px;">
        <span>2x Salsa Macha Roja (250ml)</span>
        <span>$100.00</span>
      </div>
      <hr style="border: 0.5px solid #ddd; margin: 10px 0;">
      <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 16px;">
        <span>Total a pagar:</span>
        <span style="color: var(--color-primario);">$100.00</span>
      </div>
    </div>

    <button type="button" style="background-color: #25D366; color: white; border: none; border-radius: 8px; padding: 15px; font-size: 16px; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 6px rgba(37, 211, 102, 0.3);">
      <span style="font-size: 20px;">💬</span> Enviar Pedido por WhatsApp
    </button>
    
    <button routerLink="/carrito" style="background: transparent; border: none; color: var(--texto-secundario); cursor: pointer; text-decoration: underline; margin-top: 5px;">Regresar al carrito</button>

  </form>
</div>
