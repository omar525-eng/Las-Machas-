<div class="contenedor-mis-datos">
  <button type="button" (click)="regresar()" class="btn-regresar">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    Regresar
  </button>

  <h2>Mis Datos</h2>
  <p class="subtitulo">Actualiza tu información de contacto y envío.</p>

  <div class="tarjeta-datos">
    <form (ngSubmit)="guardarDatos()">
      <div class="form-group">
        <label>Nombre Completo</label>
        <input type="text" [(ngModel)]="usuario.nombreCompleto" name="nombre" placeholder="Ej. Omar Ornelas" required>
      </div>

      <div class="form-group">
        <label>Teléfono (WhatsApp)</label>
        <input type="tel" [(ngModel)]="usuario.telefono" name="telefono" placeholder="Ej. 4491234567" required>
      </div>

      <div class="form-group">
        <label>Dirección de Envío (Por defecto)</label>
        <textarea [(ngModel)]="usuario.direccionDefecto" name="direccion" placeholder="Calle, Número, Colonia..." rows="3" required></textarea>
      </div>

      <button type="submit" class="btn-guardar">Guardar Cambios</button>
    </form>
  </div>
</div>
