<div style="padding: 20px; max-width: 800px; margin: 0 auto;">
  
  <h2 class="titulo-tarjeta" style="margin-bottom: 5px;">Actualizar Producto</h2>
  <p style="color: var(--texto-secundario); margin-bottom: 24px;">Modifica los precios o ajusta el inventario de esta presentación.</p>

  <div style="background-color: var(--color-tarjeta); border-radius: var(--radio-borde); box-shadow: var(--sombra-tarjeta); padding: 24px;">
    
    <form style="display: flex; flex-direction: column; gap: 24px;">

      <div>
        <h3 style="font-size: 16px; color: var(--color-primario); margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px;">Datos Generales</h3>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div>
            <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Nombre del Producto</label>
            <input type="text" value="Salsa Macha Roja" disabled style="width: 100%; padding: 12px; border: 1px dashed #ccc; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; background-color: #f9f9f9; color: #9e9e9e; cursor: not-allowed;">
          </div>
          <div>
            <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Categoría</label>
            <select disabled style="width: 100%; padding: 12px; border: 1px dashed #ccc; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; background-color: #f9f9f9; color: #9e9e9e; cursor: not-allowed;">
              <option selected>Salsas</option>
              <option>Encurtidos</option>
            </select>
          </div>
        </div>
      </div>

      <div>
        <h3 style="font-size: 16px; color: var(--color-primario); margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px;">Precios e Inventario</h3>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div>
            <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Tamaño o Presentación</label>
            <select disabled style="width: 100%; padding: 12px; border: 1px dashed #ccc; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; background-color: #f9f9f9; color: #9e9e9e; cursor: not-allowed;">
              <option selected>Frasco 250ml</option>
            </select>
          </div>
          
          <div style="display: flex; gap: 12px;">
            <div style="flex: 1;">
              <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Precio Regular</label>
              <input type="number" value="50.00" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario);">
            </div>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;">
          <div>
            <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Stock Actual</label>
            <input type="number" value="20" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario);">
          </div>
          <div>
            <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Stock Mínimo (Alerta)</label>
            <input type="number" value="5" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario);">
          </div>
        </div>
      </div>

      <div style="display: flex; gap: 16px; margin-top: 10px;">
        <button type="button" routerLink="/admin/catalogo" style="flex: 1; padding: 14px; background-color: #f5f5f5; color: var(--texto-secundario); font-weight: bold; border: 1px solid #ddd; border-radius: 8px; cursor: pointer;">
          Cancelar
        </button>
        <button type="button" routerLink="/admin/catalogo" class="btn-machas" style="flex: 2; padding: 14px;">
          Guardar Cambios
        </button>
      </div>

    </form>
  </div>
</div>
