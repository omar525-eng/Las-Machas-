<div style="padding: 20px; max-width: 1000px; margin: 0 auto;">
  
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">

      </thead>
      <tbody>
        
        <tr style="border-bottom: 1px solid #eee;">
          <td style="padding: 12px 8px; font-weight: bold; color: var(--color-tipografia);">Verónica Álvarez</td>
          <td style="padding: 12px 8px; color: var(--texto-secundario);">veronica@lasmachas.com</td>
          <td style="padding: 12px 8px;">
            <span style="background-color: #E3F2FD; color: #1565C0; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;">Administradora Principal</span>
          </td>
          <td style="padding: 12px 8px;"><span style="color: #2e7d32; font-weight: bold;">Activo</span></td>

        <tr>
          <td style="padding: 12px 8px; font-weight: bold; color: var(--color-tipografia);">Carlos Gómez</td>
          <td style="padding: 12px 8px; color: var(--texto-secundario);">carlos.ventas@lasmachas.com</td>
          <td style="padding: 12px 8px;">
            <span style="background-color: #F5F5F5; color: #616161; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;">Asistente de Pedidos</span>
          </td>
          <td style="padding: 12px 8px;"><span style="color: #2e7d32; font-weight: bold;">Activo</span></td>
          <td style="padding: 12px 8px; text-align: center;">
            <button style="background: var(--color-secundario); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin-right: 5px;">Editar</button>
            <button style="background: #e53935; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer;">Suspender</button>

        </tr>
