<div style="padding: 20px; max-width: 800px; margin: 0 auto;">
  
  <div style="margin-bottom: 24px;">
    <h2 class="titulo-tarjeta" style="margin-bottom: 5px;">Tablero de Pedidos</h2>
    <p style="color: var(--texto-secundario); font-size: 14px;">Gestiona las ventas y el estatus de entrega.</p>
  </div>

  <div style="display: flex; gap: 10px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 5px;">
    <button style="background: var(--color-primario); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer;">Nuevos (1)</button>
    <button style="background: white; color: var(--texto-secundario); border: 1px solid #ddd; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer;">En Proceso</button>
    <button style="background: white; color: var(--texto-secundario); border: 1px solid #ddd; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer;">Entregados</button>
  </div>

  <div style="display: flex; flex-direction: column; gap: 16px;">

    <div style="background-color: var(--color-tarjeta); border-radius: var(--radio-borde); box-shadow: var(--sombra-tarjeta); padding: 16px; border-left: 5px solid #F57F17;">
      
      <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
        <span style="font-weight: bold; font-size: 16px; color: var(--color-tipografia);">Folio: #PED-1042</span>
        <span style="background-color: #FFF9C4; color: #F57F17; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;">Pendiente</span>
      </div>
      
      <div style="margin-bottom: 4px; font-size: 14px;"><strong>Cliente:</strong> Arturo Esparza</div>
      <div style="margin-bottom: 4px; color: var(--texto-secundario); font-size: 14px;"><strong>Fecha:</strong> 04 Mar 2026 - 10:30 AM</div>
      <div style="margin-bottom: 16px; color: var(--texto-secundario); font-size: 14px;"><strong>Total a cobrar:</strong> $145.00</div>

      <div style="display: flex; gap: 10px;">
        <button class="btn-machas" routerLink="/admin/detalle-pedido" style="flex: 1; padding: 10px 0; font-size: 14px;">Ver Detalles</button>
        <button style="flex: 1; padding: 10px 0; font-size: 14px; background: white; color: #4CAF50; border: 1px solid #4CAF50; border-radius: 8px; font-weight: bold; cursor: pointer;">Marcar Entregado</button>
      </div>
    </div>

    <div style="background-color: var(--color-tarjeta); border-radius: var(--radio-borde); box-shadow: var(--sombra-tarjeta); padding: 16px; border-left: 5px solid #4CAF50;">
      
      <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
        <span style="font-weight: bold; font-size: 16px; color: var(--color-tipografia);">Folio: #PED-1041</span>
        <span style="background-color: #E8F5E9; color: #2E7D32; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;">Entregado</span>
      </div>
      
      <div style="margin-bottom: 4px; font-size: 14px;"><strong>Cliente:</strong> Mariana Ríos</div>
      <div style="margin-bottom: 4px; color: var(--texto-secundario); font-size: 14px;"><strong>Fecha:</strong> 03 Mar 2026 - 04:15 PM</div>
      <div style="margin-bottom: 16px; color: var(--texto-secundario); font-size: 14px;"><strong>Total pagado:</strong> $285.00</div>

      <div style="display: flex; gap: 10px;">
        <button class="btn-machas" routerLink="/admin/detalle-pedido" style="width: 100%; padding: 10px 0; font-size: 14px; background-color: #f5f5f5; color: var(--texto-secundario); border: none;">Ver Historial</button>
      </div>
    </div>

  </div>
</div>
