<div style="padding: 20px; max-width: 800px; margin: 0 auto;">
  
  <h2 class="titulo-tarjeta" style="margin-bottom: 5px;">Añadir Nuevo Producto</h2>
  <p style="color: var(--texto-secundario); margin-bottom: 24px;">Registra una nueva presentación en el inventario.</p>

  <div style="background-color: var(--color-tarjeta); border-radius: var(--radio-borde); box-shadow: var(--sombra-tarjeta); padding: 24px;">
    
    <form style="display: flex; flex-direction: column; gap: 24px;">

      <div>
        <h3 style="font-size: 16px; color: var(--color-primario); margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px;">1. Datos Generales</h3>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div>
            <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Nombre del Producto</label>
            <input type="text" placeholder="Ej. Salsa Macha con Ajo" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario);">
          </div>
          <div>
            <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Categoría</label>
            <select style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario); background-color: white;">
              <option>Salsas</option>
              <option>Encurtidos</option>
            </select>
          </div>
        </div>

        <div style="margin-top: 16px;">
          <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">URL de la Imagen</label>
          <input type="text" placeholder="https://..." style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario);">
        </div>
      </div>

      <div>
        <h3 style="font-size: 16px; color: var(--color-primario); margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px;">2. Precios e Inventario (SKU)</h3>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div>
            <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Tamaño / Presentación</label>
            <select style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario); background-color: white;">
              <option>Frasco 250ml</option>
              <option>Frasco 500ml</option>
            </select>
          </div>
          
          <div style="display: flex; gap: 12px;">
            <div style="flex: 1;">
              <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Precio Regular</label>
              <input type="number" placeholder="$ 0.00" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario);">
            </div>
            <div style="flex: 1;">
              <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Precio Mayoreo</label>
              <input type="number" placeholder="$ 0.00" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario);">
            </div>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;">
          <div>
            <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Stock Inicial</label>
            <input type="number" placeholder="0" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario);">
          </div>
          <div>
            <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Stock Mínimo (Alerta)</label>
            <input type="number" placeholder="5" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario);">
          </div>
        </div>
      </div>

      <div style="display: flex; gap: 16px; margin-top: 10px;">
        <button type="button" routerLink="/admin/catalogo" style="flex: 1; padding: 14px; background-color: #f5f5f5; color: var(--texto-secundario); font-weight: bold; border: 1px solid #ddd; border-radius: 8px; cursor: pointer;">
          Cancelar
        </button>
        <button type="button" routerLink="/admin/catalogo" class="btn-machas" style="flex: 2; padding: 14px;">
          Guardar Producto
        </button>
      </div>

    </form>
  </div>
</div>
