<div style="padding: 20px; max-width: 800px; margin: 0 auto;">
  
  <h2 class="titulo-tarjeta" style="margin-bottom: 5px;">Agregar Nuevo Producto</h2>
  <p style="color: var(--texto-secundario); margin-bottom: 24px;">Registra un nuevo producto.</p>

  <div style="background-color: var(--color-tarjeta); border-radius: var(--radio-borde); box-shadow: var(--sombra-tarjeta); padding: 24px;">
    
    <form [formGroup]="productoForm" (ngSubmit)="guardarProducto()" style="display: flex; flex-direction: column; gap: 24px;">

      <div>
        <h3 style="font-size: 16px; color: var(--color-primario); margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px;">1. Datos Generales</h3>
        
        <div>
          <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Nombre del Producto</label>
          <input type="text" formControlName="Nombre" placeholder="Ej. Salsa Macha con Ajo" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario);">
        </div>

        <div style="margin-top: 16px;">
          <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Categoría</label>
          <select formControlName="CategoriaID" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario); background-color: white;">
            <option value="1">Salsas</option>
            <option value="2">Encurtidos</option>
          </select>
        </div>

        <div style="margin-top: 16px;">
          <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Descripción</label>
          <textarea formControlName="Descripcion" rows="3" placeholder="Ej. Deliciosa mezcla artesanal con notas de ajo..." style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario); resize: vertical;"></textarea>
        </div>

        <div style="margin-top: 16px;">
          <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia); display: block; margin-bottom: 8px;">Fotografía de la Salsa</label>
          
          <input type="file" #fileInput accept="image/*" (change)="onFileSelected($event)" style="display: none;">
          
          <button type="button" (click)="fileInput.click()" 
                  style="width: 100%; padding: 12px; background-color: white; border: 1px solid var(--color-primario); color: var(--color-primario); border-radius: 8px; font-size: 14px; cursor: pointer; transition: 0.3s; text-align: center;">
            Seleccionar imagen desde la computadora
          </button>

          <div style="text-align: center; margin-top: 8px;" *ngIf="imagenSeleccionada">
            <span style="font-size: 12px; color: #4CAF50; font-weight: bold;">
            Archivo listo: {{ imagenSeleccionada.name }}
            </span>
          </div>
          
          @if (imagenPreview) {
            <div style="margin-top: 15px; display: flex; align-items: center; gap: 20px; background: #fdfdfd; padding: 20px; border-radius: 12px; border: 1px dashed #e0e0e0;">
              <div style="position: relative; width: 120px; height: 120px;">
                <img [src]="imagenPreview" alt="Vista previa de salsa" 
                     style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid #eee; box-shadow: 0 4px 8px rgba(0,0,0,0.05);">
                <span style="position: absolute; top: -5px; right: -5px; background: #4CAF50; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold;">
                  Nueva
                </span>
              </div>
              <div>
                <p style="font-size: 13px; font-weight: bold; color: var(--color-primario); margin: 0;">Vista previa de la imagen</p>
                <p style="font-size: 12px; color: #888; margin: 4px 0 0 0;">Así se verá la salsa en el catálogo cuando la subas.</p>
              </div>
            </div>
          }
        </div>
      </div>

      <div>
        <h3 style="font-size: 16px; color: var(--color-primario); margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px;">2. Precios e Inventario</h3>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div>
            <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Tamaño / Presentación</label>
            <select formControlName="Tamano" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario); background-color: white;">
              <option value="Frasco 250ml">Frasco 250ml</option>
              <option value="Frasco 500ml">Frasco 500ml</option>
            </select>
          </div>
          
          <div style="display: flex; gap: 12px;">
            <div style="flex: 1;">
              <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Precio Regular</label>
              <input type="number" formControlName="PrecioRegular" placeholder="$ 0.00" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario);">
            </div>
            <div style="flex: 1;">
              <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Precio Mayoreo</label>
              <input type="number" formControlName="PrecioMayoreo" placeholder="$ 0.00" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario);">
            </div>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;">
          <div>
            <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Stock Inicial</label>
            <input type="number" formControlName="Stock" placeholder="0" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario);">
          </div>
          <div>
            <label style="font-size: 14px; font-weight: bold; color: var(--color-tipografia);">Stock Mínimo (Alerta)</label>
            <input type="number" formControlName="StockMinimo" placeholder="5" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 6px; font-family: 'Inter', sans-serif; outline-color: var(--color-primario);">
          </div>
        </div>
      </div>

      <div style="display: flex; gap: 16px; margin-top: 10px;">
        <button type="button" routerLink="/admin/catalogo" style="flex: 1; padding: 14px; background-color: #f5f5f5; color: var(--texto-secundario); font-weight: bold; border: 1px solid #ddd; border-radius: 8px; cursor: pointer;">
          Cancelar
        </button>
        <button type="submit" class="btn-machas" style="flex: 2; padding: 14px; cursor: pointer;">
          Guardar Producto
        </button>
      </div>

    </form>
  </div>
</div>
