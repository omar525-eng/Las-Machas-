<div class="form-container">
  
  <h2 class="titulo-pagina">Agregar Nuevo Producto</h2>
  <p class="subtitulo-pagina">Registra una nueva salsa en el catálogo.</p>

  <div class="card-formulario">
    
    <form [formGroup]="productoForm" (ngSubmit)="guardarProducto()" class="form-layout">

      <div class="seccion-form">
        <h3 class="titulo-seccion">1. Datos Generales</h3>
        
        <div class="form-group">
          <label>Nombre del Producto *</label>
          <input type="text" formControlName="Nombre" placeholder="Ej. Salsa Macha con Ajo" 
                 [class.input-error]="productoForm.get('Nombre')?.invalid && productoForm.get('Nombre')?.touched">
        </div>

        <div class="form-group">
          <label>Categoría *</label>
          <select formControlName="CategoriaID">
            <option value="1">Salsas</option>
            <option value="2">Encurtidos</option>
            <option value="nueva" disabled>+ Registrar Nueva Categoría (Próximamente)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Descripción</label>
          <textarea formControlName="Descripcion" rows="3" placeholder="Ej. Deliciosa mezcla artesanal con notas de ajo..."></textarea>
        </div>

        <div class="form-group">
          <label class="mb-8">Fotografía de la Salsa</label>
          <input type="file" #fileInput accept="image/*" (change)="onFileSelected($event)" class="hidden-input">
          
          <button type="button" (click)="fileInput.click()" class="btn-upload">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Seleccionar imagen desde la computadora
          </button>

          <div *ngIf="imagenSeleccionada" class="file-status">
            Archivo listo: {{ imagenSeleccionada.name }}
          </div>
          
          @if (imagenPreview) {
            <div class="preview-box">
              <div class="preview-img-wrapper">
                <img [src]="imagenPreview" alt="Vista previa" class="preview-img">
                <span class="badge-nueva">Nueva</span>
                
                <button type="button" class="btn-remover-img" (click)="removerImagen(fileInput)" title="Quitar imagen">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                  </svg>
                </button>
                
              </div>
              <div class="preview-text">
                <p class="preview-title">Vista previa de la imagen</p>
                <p class="preview-desc">Así se verá la salsa en el catálogo cuando la subas.</p>
              </div>
            </div>
          }
        </div>
      </div>

      <div class="seccion-form">
        <h3 class="titulo-seccion">2. Precios e Inventario</h3>
        
        <div class="grid-2-col">
          <div class="form-group">
            <label>Tamaño / Presentación *</label>
            <select formControlName="Tamano">
              <option value="Frasco 250ml">Frasco 250ml</option>
              <option value="Frasco 500ml">Frasco 500ml</option>
              <option value="otro" disabled>+ Registrar otra presentación (Próximamente)</option>
            </select>
          </div>
          
          <div class="grid-2-col-inner">
            <div class="form-group">
              <label>Precio Regular *</label>
              <input type="number" min="0" step="0.01" formControlName="PrecioRegular" placeholder="$ 0.00"
                     [class.input-error]="productoForm.get('PrecioRegular')?.invalid && productoForm.get('PrecioRegular')?.touched">
            </div>
            <div class="form-group">
              <label>Precio Mayoreo</label>
              <input type="number" min="0" step="0.01" formControlName="PrecioMayoreo" placeholder="$ 0.00"
                     [class.input-error]="productoForm.get('PrecioMayoreo')?.invalid && productoForm.get('PrecioMayoreo')?.touched">
            </div>
          </div>
        </div>

        <div class="grid-2-col">
          <div class="form-group">
            <label>Stock Inicial *</label>
            <input type="number" min="0" formControlName="Stock" placeholder="0"
                   [class.input-error]="productoForm.get('Stock')?.invalid && productoForm.get('Stock')?.touched">
          </div>
          <div class="form-group">
            <label>Stock Mínimo (Alerta)</label>
            <input type="number" min="0" formControlName="StockMinimo" placeholder="5"
                   [class.input-error]="productoForm.get('StockMinimo')?.invalid && productoForm.get('StockMinimo')?.touched">
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" routerLink="/admin/catalogo" class="btn-cancelar">
          Cancelar
        </button>
        <button type="submit" class="btn-guardar" [disabled]="guardando()">
          {{ guardando() ? 'Guardando y subiendo imagen...' : 'Guardar Producto' }}
        </button>
      </div>

    </form>
  </div>
</div>
