<div class="login-wrapper">
  <div class="login-card">
    
    <div class="brand-header">
      <h1 class="brand-title">Las Machas</h1>
      <h2 class="welcome-text">¡Hola! Bienvenido</h2>
      <p class="subtitle">¿Listo para empezar tu compra?</p>
    </div>

    <!-- 1. Conectamos el form al FormBuilder de Mike y a su función onSubmit -->
    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="input-group">
        <label for="email">Correo Electrónico</label>
        <!-- 2. Conectamos el input al control "correo" -->
        <input type="email" id="email" formControlName="correo" placeholder="ejemplo@correo.com">
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <!-- 3. Conectamos el input al control "password" -->
        <input type="password" id="password" formControlName="password" placeholder="••••••••">
      </div>

      <!-- 4. Cambiamos type="button" por type="submit" para que dispare el formulario -->
      <button type="submit" class="btn-primary">Iniciar Sesión</button>
    </form>

    <div class="guest-link">
      <!-- 5. Quitamos el href="#" que recargaba la página y le conectamos el (click) -->
      <a style="cursor: pointer;" (click)="entrarComoInvitado()">&larr; Echar un vistazo como invitado</a>
    </div>

    <hr class="divider">

    <div class="register-section">
      <p>¿No tienes cuenta?</p>
      <!-- 6. Conectamos el botón al routerLink para que mande al registro -->
      <button type="button" class="btn-secondary" routerLink="/registro">¡Regístrate aquí!</button>
    </div>

  </div>
</div>
